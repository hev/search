name: Publish Docker image

# Builds the hev search engine image with depot and pushes it to the
# mesh-account ECR. We never publish our images to ghcr.io — that's the
# portfolio house rule (see the lyr-level AGENTS.md, "Container images: ECR,
# not ghcr.io"). Depot project + AWS/ECR account details live in `layer`.
#
# Required configuration (repo/org secrets):
#   AWS_ECR_ROLE_ARN — IAM role to assume for the ECR push (GitHub OIDC trust).
#   DEPOT_TOKEN      — Depot project token (omit if the repo uses depot OIDC trust).

on:
  push:
    tags:
      - 'v*'

env:
  ECR_REGISTRY: 186219257916.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_NAME: hev-search
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # AWS OIDC role assumption

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: depot/setup-action@v1

      - name: Build and push with depot
        uses: depot/build-push-action@v1
        with:
          project: t4vlld595v
          token: ${{ secrets.DEPOT_TOKEN }}
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
